# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8081
server.forward-headers-strategy=FRAMEWORK
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always

# ===================================================================
# SPRING BOOT APPLICATION
# ===================================================================
spring.application.name=HRMS

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# Reads from environment variables if set, otherwise falls back to the
# ":default" value after the colon — so this still runs locally with no
# setup, but a Kubernetes Secret can override every value below later
# without touching this file again.
# ===================================================================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:HRMS}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA & HIBERNATE CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# SECURITY CONFIGURATION
# ===================================================================
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:changeme}

# ===================================================================
# TEMPLATING (THYMELEAF)
# ===================================================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false

# ===================================================================
# FILE UPLOAD & AWS S3 CONFIGURATION
# ===================================================================
file.upload-dir=./uploads
aws.region=${AWS_REGION:ap-south-1}
aws.s3.bucket-name=${S3_BUCKET_NAME:xrms-document-bucket}

# ===================================================================
# EMAIL (SMTP) CONFIGURATION
# ===================================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:changeme}
spring.mail.password=${SMTP_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# LOGGING CONFIGURATION
# (trimmed to WARN/INFO — the original file logged full AWS SDK request/response
#  traces and SQL bind-parameter values at DEBUG/TRACE, which is noisy and can
#  leak sensitive data into logs. Fine to turn back up temporarily when debugging.)
# ===================================================================
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.XAMMER.HRMS=DEBUG
logging.exception-conversion-word=%wEx

# ===================================================================
# SWAGGER OPENAPI
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===================================================================
# ACTUATOR & METRICS
# Actuator runs on a SEPARATE port (8082) from the app's main traffic port
# (8081). This port is never exposed via the Service or any Ingress — only
# something already inside the cluster (Prometheus) can reach it. This is
# what actually resolves the Semgrep finding: the fix isn't disabling the
# endpoints, it's making sure nothing outside the cluster can ever reach them.
management.server.port=8082
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.metrics.tags.application=${spring.application.name}