name: CI - Build, Scan, Push

on:
  push:
    branches: [main]
    paths: ["app/HRMS/**"]
  pull_request:
    branches: [main]
    paths: ["app/HRMS/**"]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: prod-xrms-hrms-app
  AWS_ROLE_ARN: arn:aws:iam::324048504012:role/prod-xrms-github-actions-ci
  APP_DIR: app/HRMS

jobs:
  build-test:
    name: Build (tests skipped)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build (tests skipped — HrmsApplicationTests requires a live MySQL
          connection that doesn't exist in CI or anywhere else right now.
          Revisit this once the app has a real database, in-cluster or RDS.)
        run: ./mvnw -B package -DskipTests

  sast-scan:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (Semgrep is a Python tool)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and run Semgrep
        run: |
          python3 -m pip install semgrep
          semgrep scan --config p/java --config p/owasp-top-ten --error "${{ env.APP_DIR }}"

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Make mvnw executable
        run: chmod +x mvnw
      - name: OWASP Dependency-Check
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9

  build-scan-push:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag to the git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: ${{ env.APP_DIR }}
        run: docker build -t "${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}" .

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Scan image with Trivy — fails the build on CRITICAL CVEs
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag "${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}" \
            "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}"
          docker push "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}"

      - name: Upload SBOM as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.vars.outputs.sha_short }}
          path: ${{ env.APP_DIR }}/sbom.cyclonedx.json
