# The "app of apps" root. This is the ONLY manifest you ever apply manually.
# It watches gitops/apps/ — anything placed in that folder becomes a
# live ArgoCD Application automatically, with no further kubectl commands.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Samm0707/Gitops-Project.git
    targetRevision: main
    path: gitops/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
